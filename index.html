<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Chat</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1c26;
  color: white;
  padding: 20px;
}

#chatBox { display: none; }

#chat {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #444;
  padding: 10px;
  margin-bottom: 10px;
}

.message {
  margin: 6px 0;
  padding: 4px;
  border-bottom: 1px solid #333;
}

.adminBtn {
  margin-left: 8px;
  font-size: 12px;
  cursor: pointer;
  color: red;
}

input, button {
  padding: 8px;
  margin: 4px 0;
}

#adminPanel {
  display: none;
  border: 1px solid #555;
  padding: 10px;
  margin-top: 10px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login / Register</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="loginOrRegister()">Login / Register</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- CHAT -->
<div id="chatBox">
  <h2>Live Chat</h2>
  <button onclick="logout()">Logout</button>

  <p>Status: <span id="statusText">Offline</span></p>
  <hr>

  <div id="chat"></div>

  <input id="messageInput" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>

  <hr>

  <h3>Online Users</h3>
  <ul id="onlineUsers"></ul>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h3>Admin Panel</h3>
    <p>You can delete messages and kick users.</p>
    <ul id="kickList"></ul>
  </div>
</div>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDbTrmHUaHodNAH130kfQJlD71iqIQ7DpQ",
  authDomain: "anything-5b5ca.firebaseapp.com",
  databaseURL: "https://anything-5b5ca-default-rtdb.firebaseio.com",
  projectId: "anything-5b5ca",
  storageBucket: "anything-5b5ca.firebasestorage.app",
  messagingSenderId: "15504021949",
  appId: "1:15504021949:web:a2e51091f3c3a617dddad4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const messagesRef = db.ref("messages");
const statusRef = db.ref("status");
const kickedRef = db.ref("kicked");

/* ================= ADMIN ================= */
const ADMIN_EMAIL = "akrh6994@gmail.com"; // 🔴 CHANGE
let isAdmin = false;

/* ================= LOGIN / REGISTER ================= */
function loginOrRegister() {
  const email = email.value.trim();
  const password = password.value.trim();
  error.textContent = "";

  if (!email || !password) {
    error.textContent = "Email and password required";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => {
      if (err.code === "auth/user-not-found") {
        auth.createUserWithEmailAndPassword(email, password)
          .catch(e => error.textContent = e.message);
      } else {
        error.textContent = err.message;
      }
    });
}

/* ================= LOGOUT ================= */
function logout() {
  auth.signOut();
}

/* ================= AUTH STATE ================= */
auth.onAuthStateChanged(user => {
  if (!user) {
    loginBox.style.display = "block";
    chatBox.style.display = "none";
    return;
  }

  // KICK CHECK
  kickedRef.child(user.uid).once("value", snap => {
    if (snap.exists()) {
      alert("You have been kicked by admin");
      auth.signOut();
    }
  });

  isAdmin = user.email === ADMIN_EMAIL;

  loginBox.style.display = "none";
  chatBox.style.display = "block";
  adminPanel.style.display = isAdmin ? "block" : "none";

  // ONLINE STATUS
  const userStatusRef = statusRef.child(user.uid);
  const connectedRef = db.ref(".info/connected");

  connectedRef.on("value", snap => {
    if (snap.val()) {
      userStatusRef.onDisconnect().set({
        email: user.email,
        state: "offline"
      });

      userStatusRef.set({
        email: user.email,
        state: "online"
      });

      statusText.textContent = "Online";
      statusText.style.color = "lightgreen";
    }
  });

  // LOAD MESSAGES
  chat.innerHTML = "";
  messagesRef.off();
  messagesRef.on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "message";

    div.textContent = m.name + ": " + m.text;

    if (isAdmin) {
      const del = document.createElement("span");
      del.textContent = "❌";
      del.className = "adminBtn";
      del.onclick = () => messagesRef.child(snap.key).remove();
      div.appendChild(del);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });
});

/* ================= SEND MESSAGE ================= */
function sendMessage() {
  if (!auth.currentUser) return;

  const text = messageInput.value.trim();
  if (!text) return;

  messagesRef.push({
    text,
    name: auth.currentUser.email.split("@")[0]
  });

  messageInput.value = "";
}

/* ================= ONLINE USERS + KICK ================= */
statusRef.on("value", snap => {
  onlineUsers.innerHTML = "";
  kickList.innerHTML = "";

  snap.forEach(child => {
    const data = child.val();

    if (data.state === "online") {
      const li = document.createElement("li");
      li.textContent = data.email;
      onlineUsers.appendChild(li);

      if (isAdmin) {
        const kickBtn = document.createElement("button");
        kickBtn.textContent = "Kick";
        kickBtn.onclick = () => {
          kickedRef.child(child.key).set(true);
        };

        const kli = document.createElement("li");
        kli.textContent = data.email + " ";
        kli.appendChild(kickBtn);
        kickList.appendChild(kli);
      }
    }
  });
});
</script>

</body>
</html>
