<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure Chat</title>

<style>
body{
margin:0;min-height:100vh;display:grid;place-items:center;
font-family:system-ui;background:linear-gradient(135deg,#07121f,#112632);color:#eff6ff
}
.panel{
width:360px;background:rgba(7,18,31,.8);
padding:20px;border-radius:16px
}
h2{text-align:center}
input,button{
width:100%;height:42px;margin-top:8px;
border-radius:10px;border:none;padding:8px
}
button{
background:#2dd4bf;color:#022c22;font-weight:bold;cursor:pointer
}
#chatBox{display:none}
#chat{height:240px;overflow:auto;border:1px solid #334;padding:8px;margin:8px 0}
.message{margin-bottom:6px}
.status{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e}
.offline .dot{background:#ef4444}
.logout{background:#ef4444;color:#fff}
</style>
</head>

<body>

<div class="panel" id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password (min 6 chars)">
  <button onclick="login()">Login / Register</button>
</div>

<div class="panel" id="chatBox">
  <div class="status" id="status">
    <span class="dot"></span>
    <span id="statusText">Online</span>
  </div>

  <div id="chat"></div>

  <input id="message" placeholder="Message">
  <button onclick="sendMessage()">Send</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDbTrmHUaHodNAH130kfQJlD71iqIQ7DpQ",
  authDomain: "anything-5b5ca.firebaseapp.com",
  databaseURL: "https://anything-5b5ca-default-rtdb.firebaseio.com",
  projectId: "anything-5b5ca"
});

const auth = firebase.auth();
const db = firebase.database();
const messagesRef = db.ref("messages");
const presenceRef = db.ref("presence");
const connectedRef = db.ref(".info/connected");

const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("chatBox");
const chat = document.getElementById("chat");
const status = document.getElementById("status");
const statusText = document.getElementById("statusText");

/* ✅ FIXED LOGIN */
function login(){
  const emailInput = document.getElementById("email").value.trim();
  const passInput = document.getElementById("password").value.trim();

  if (!emailInput || !passInput) {
    alert("Please enter email and password");
    return;
  }

  auth.signInWithEmailAndPassword(emailInput, passInput)
    .catch(error => {
      if (error.code === "auth/user-not-found") {
        auth.createUserWithEmailAndPassword(emailInput, passInput);
      } else {
        alert(error.message);
      }
    });
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    chatBox.style.display="block";

    const name = user.email.split("@")[0];
    const userRef = presenceRef.child(user.uid);

    connectedRef.on("value", snap=>{
      if(snap.val()){
        userRef.set(name);
        userRef.onDisconnect().remove();
        setOnline(true);
      }
    });

  }else{
    loginBox.style.display="block";
    chatBox.style.display="none";
    setOnline(false);
  }
});

/* ONLINE STATUS */
function setOnline(on){
  status.classList.toggle("offline",!on);
  statusText.textContent = on ? "Online" : "Offline";
}

/* CHAT */
messagesRef.on("child_added",snap=>{
  const m = snap.val();
  const div = document.createElement("div");
  div.className="message";
  div.textContent = m.name + ": " + m.text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

function sendMessage(){
  const msg = message.value.trim();
  const user = auth.currentUser;
  if(!msg || !user) return;

  messagesRef.push({
    name: user.email.split("@")[0],
    text: msg
  });
  message.value="";
}
</script>

</body>
</html>
