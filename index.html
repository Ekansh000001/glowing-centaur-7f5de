<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* LOGIN */
#loginBox {
  width: 340px;
  padding: 30px;
  border-radius: 16px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0,0,0,.4);
}

#loginBox h2 {
  text-align: center;
  margin-bottom: 20px;
}

#loginBox input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

#loginBox button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #00c6ff;
  color: black;
  font-weight: bold;
}

/* CHAT LAYOUT */
#chatBox {
  display: none;
  width: 90%;
  height: 90vh;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(15px);
  box-shadow: 0 30px 60px rgba(0,0,0,.5);
  display: grid;
  grid-template-columns: 260px 1fr;
}

/* SIDEBAR */
#sidebar {
  background: rgba(0,0,0,.6);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

#sidebar h3 {
  margin: 0 0 10px;
}

#onlineUsers li {
  list-style: none;
  margin: 6px 0;
  font-size: 14px;
}

#logoutBtn {
  margin-top: auto;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: crimson;
  color: white;
}

/* CHAT AREA */
#chatArea {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#chatHeader {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  display: flex;
  justify-content: space-between;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  max-width: 60%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  position: relative;
}

.me {
  background: #00c6ff;
  color: black;
  margin-left: auto;
}

.other {
  background: rgba(255,255,255,.15);
}

.adminBadge {
  font-size: 10px;
  background: gold;
  color: black;
  padding: 2px 6px;
  border-radius: 6px;
  margin-left: 6px;
}

.deleteBtn {
  position: absolute;
  top: -6px;
  right: -6px;
  background: crimson;
  border: none;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  cursor: pointer;
  font-size: 10px;
}

/* INPUT */
#inputBar {
  padding: 14px;
  display: flex;
  gap: 10px;
}

#inputBar input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
}

#inputBar button {
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #00c6ff;
  font-weight: bold;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Welcome Back</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginOrRegister()">Login / Register</button>
  <p id="error" style="color:salmon;text-align:center;"></p>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="sidebar">
    <h3>Online</h3>
    <ul id="onlineUsers"></ul>
    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>

  <div id="chatArea">
    <div id="chatHeader">
      <span>Status: <b id="statusText">Offline</b></span>
      <span id="adminText"></span>
    </div>

    <div id="chat"></div>

    <div id="inputBar">
      <input id="messageInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
/* FIREBASE CONFIG */
firebase.initializeApp({
  apiKey: "AIzaSyDbTrmHUaHodNAH130kfQJlD71iqIQ7DpQ",
  authDomain: "anything-5b5ca.firebaseapp.com",
  databaseURL: "https://anything-5b5ca-default-rtdb.firebaseio.com",
  projectId: "anything-5b5ca",
  appId: "1:15504021949:web:a2e51091f3c3a617dddad4"
});

const auth = firebase.auth();
const db = firebase.database();

const ADMIN_EMAIL = "akrh6994@gmail.com";
let isAdmin = false;

/* LOGIN */
function loginOrRegister(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>{
    if(e.code==="auth/user-not-found"){
      auth.createUserWithEmailAndPassword(email.value,password.value)
      .catch(er=>error.textContent=er.message)
    } else error.textContent=e.message
  })
}

/* LOGOUT */
function logout(){ auth.signOut(); }

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(!user){
    loginBox.style.display="block";
    chatBox.style.display="none";
    return;
  }

  isAdmin = user.email===ADMIN_EMAIL;
  adminText.textContent = isAdmin ? "ADMIN MODE" : "";

  loginBox.style.display="none";
  chatBox.style.display="grid";

  const statusRef=db.ref("status/"+user.uid);
  db.ref(".info/connected").on("value",s=>{
    if(s.val()){
      statusRef.onDisconnect().set({email:user.email,state:"offline"});
      statusRef.set({email:user.email,state:"online"});
      statusText.textContent="Online";
    }
  });

  db.ref("messages").on("child_added",snap=>{
    const m=snap.val();
    const div=document.createElement("div");
    div.className="message "+(m.uid===user.uid?"me":"other");
    div.textContent=m.name+": "+m.text;

    if(isAdmin){
      const d=document.createElement("button");
      d.textContent="×";
      d.className="deleteBtn";
      d.onclick=()=>db.ref("messages/"+snap.key).remove();
      div.appendChild(d);
    }

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
  });
});

/* SEND */
function sendMessage(){
  if(!messageInput.value) return;
  const u=auth.currentUser;
  db.ref("messages").push({
    text:messageInput.value,
    name:u.email.split("@")[0],
    uid:u.uid
  });
  messageInput.value="";
}

/* ONLINE USERS */
db.ref("status").on("value",snap=>{
  onlineUsers.innerHTML="";
  snap.forEach(c=>{
    if(c.val().state==="online"){
      const li=document.createElement("li");
      li.textContent=c.val().email;
      onlineUsers.appendChild(li);
    }
  })
});
</script>
</body>
</html>
