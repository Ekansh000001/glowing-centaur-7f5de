<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Chat</title>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1c26;
      color: white;
      padding: 20px;
    }
    #chatBox { display: none; }
    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin: 6px 0;
    }
    input, button {
      padding: 8px;
      margin: 4px 0;
    }
  </style>
</head>
<body>

<!-- LOGIN / REGISTER -->
<div id="loginBox">
  <h2>Login / Register</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="loginOrRegister()">Login / Register</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- CHAT -->
<div id="chatBox">
  <h2>Live Chat</h2>
  <div id="chat"></div>
  <input id="messageInput" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  // 🔥 FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDbTrmHUaHodNAH130kfQJlD71iqIQ7DpQ",
    authDomain: "anything-5b5ca.firebaseapp.com",
    databaseURL: "https://anything-5b5ca-default-rtdb.firebaseio.com",
    projectId: "anything-5b5ca",
    storageBucket: "anything-5b5ca.firebasestorage.app",
    messagingSenderId: "15504021949",
    appId: "1:15504021949:web:a2e51091f3c3a617dddad4"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database();
  const messagesRef = db.ref("messages");

  // 🔐 LOGIN OR REGISTER
  function loginOrRegister() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("error");
    errorBox.textContent = "";

    if (!email || !password) {
      errorBox.textContent = "Email and password required";
      return;
    }

    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        if (err.code === "auth/user-not-found") {
          auth.createUserWithEmailAndPassword(email, password)
            .catch(e => errorBox.textContent = e.message);
        } else {
          errorBox.textContent = err.message;
        }
      });
  }

  // 🔁 AUTH STATE
  auth.onAuthStateChanged(user => {
    if (!user) return;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "block";

    document.getElementById("chat").innerHTML = "";
    messagesRef.off();

    messagesRef.on("child_added", snap => {
      const msg = snap.val();
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = msg.name + ": " + msg.text;
      document.getElementById("chat").appendChild(div);
    });
  });

  // ✉ SEND MESSAGE
  function sendMessage() {
    const text = document.getElementById("messageInput").value.trim();
    if (!text || !auth.currentUser) return;

    messagesRef.push({
      text: text,
      name: auth.currentUser.email.split("@")[0],
      time: Date.now()
    });

    document.getElementById("messageInput").value = "";
  }
</script>

</body>
</html>
