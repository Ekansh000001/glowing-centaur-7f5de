<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Chat with Admin Panel</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1c26;
  color: white;
  padding: 20px;
}
#chatBox { display: none; }
#chat {
  height: 250px;
  overflow-y: auto;
  border: 1px solid #444;
  padding: 10px;
}
.message { margin: 6px 0; }
input, button { padding: 8px; margin: 4px 0; }

.logout {
  background:#c0392b;
  color:white;
  border:none;
  cursor:pointer;
}

#adminPanel {
  display:none;
  border:1px solid #666;
  padding:10px;
  margin-top:15px;
  background:#112733;
}
#adminLogs {
  max-height:150px;
  overflow-y:auto;
  font-size:13px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login / Register</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="loginOrRegister()">Login / Register</button>
  <p id="error" style="color:red"></p>
</div>

<!-- CHAT -->
<div id="chatBox">
  <h2>Live Chat</h2>

  <div>
    Status: <span id="statusText">Offline</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div id="chat"></div>

  <input id="messageInput" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>

  <h3>Online Users</h3>
  <ul id="onlineUsers"></ul>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h3>Admin Log Panel</h3>
    <div id="adminLogs"></div>
  </div>
</div>

<script>
/* ===== FIREBASE CONFIG ===== */
firebase.initializeApp({
  apiKey: "AIzaSyDbTrmHUaHodNAH130kfQJlD71iqIQ7DpQ",
  authDomain: "anything-5b5ca.firebaseapp.com",
  databaseURL: "https://anything-5b5ca-default-rtdb.firebaseio.com",
  projectId: "anything-5b5ca"
});

const auth = firebase.auth();
const db = firebase.database();

const messagesRef = db.ref("messages");
const statusRef = db.ref("status");
const logsRef = db.ref("logs");

const ADMIN_EMAIL = "akrh6994@gmail.com";
let isAdmin = false;

/* ===== LOGIN / REGISTER (FIXED) ===== */
function loginOrRegister() {
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const errorBox = document.getElementById("error");

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  errorBox.textContent = "";

  if (!email || !password) {
    errorBox.textContent = "Email and password required";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => {
      if (err.code === "auth/user-not-found") {
        auth.createUserWithEmailAndPassword(email, password)
          .catch(e => errorBox.textContent = e.message);
      } else {
        errorBox.textContent = err.message;
      }
    });
}

/* ===== AUTH STATE ===== */
auth.onAuthStateChanged(user => {
  if (!user) {
    loginBox.style.display = "block";
    chatBox.style.display = "none";
    return;
  }

  isAdmin = user.email === ADMIN_EMAIL;

  loginBox.style.display = "none";
  chatBox.style.display = "block";
  adminPanel.style.display = isAdmin ? "block" : "none";
  chat.innerHTML = "";

  logEvent(user.email + " logged in");

  /* ONLINE STATUS */
  const userStatus = db.ref("status/" + user.uid);
  db.ref(".info/connected").on("value", snap => {
    if (snap.val()) {
      userStatus.onDisconnect().set({ state:"offline", email:user.email });
      userStatus.set({ state:"online", email:user.email });
      statusText.textContent = "Online";
    }
  });

  /* CHAT */
  messagesRef.off();
  messagesRef.on("child_added", snap => {
    const m = snap.val();
    const d = document.createElement("div");
    d.className = "message";
    d.textContent = (isAdmin ? "[ADMIN] " : "") + m.name + ": " + m.text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  });

  /* ADMIN LOG VIEW */
  if (isAdmin) {
    adminLogs.innerHTML = "";
    logsRef.limitToLast(50).on("child_added", s => {
      const p = document.createElement("div");
      p.textContent =
        new Date(s.val().time).toLocaleTimeString() +
        " - " + s.val().text;
      adminLogs.appendChild(p);
    });
  }
});

/* ===== SEND MESSAGE ===== */
function sendMessage() {
  if (!auth.currentUser) return;
  const text = messageInput.value.trim();
  if (!text) return;

  messagesRef.push({
    name: auth.currentUser.email.split("@")[0],
    text: text,
    time: Date.now()
  });

  logEvent(auth.currentUser.email + " sent message");
  messageInput.value = "";
}

/* ===== LOGOUT ===== */
function logout() {
  if (!auth.currentUser) return;
  logEvent(auth.currentUser.email + " logged out");
  db.ref("status/" + auth.currentUser.uid)
    .set({ state:"offline", email:auth.currentUser.email })
    .then(() => auth.signOut());
}

/* ===== ONLINE USERS ===== */
statusRef.on("value", snap => {
  onlineUsers.innerHTML = "";
  snap.forEach(c => {
    if (c.val().state === "online") {
      const li = document.createElement("li");
      li.textContent = c.val().email;
      onlineUsers.appendChild(li);
    }
  });
});

/* ===== LOG FUNCTION ===== */
function logEvent(text) {
  logsRef.push({ text:text, time:Date.now() });
}
</script>

</body>
</html>
