<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
  <style>
    :root {
      --ink: #eff6ff;
      --muted: #a9b8c9;
      --panel: rgba(7, 18, 31, 0.78);
      --line: rgba(174, 205, 237, 0.2);
      --accent: #2dd4bf;
      --accent-dark: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(45, 212, 191, 0.34), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(125, 211, 252, 0.28), transparent 28%),
        radial-gradient(circle at 72% 84%, rgba(251, 191, 36, 0.18), transparent 26%),
        linear-gradient(135deg, #07121f 0%, #0c1f31 42%, #112632 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    body::after {
      background:
        linear-gradient(120deg, transparent 0 42%, rgba(255, 255, 255, 0.07) 43%, transparent 45% 100%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 36%);
      mix-blend-mode: screen;
      opacity: 0.65;
    }

    main {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(22px);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), transparent 34%);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      position: relative;
    }

    .user-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(2, 10, 19, 0.48);
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 14px rgba(34, 197, 94, 0.75);
    }

    .user-status.is-offline .status-dot {
      background: #ef4444;
      box-shadow: 0 0 14px rgba(239, 68, 68, 0.75);
    }

    .presence-user.is-offline .status-dot {
      background: #ef4444;
      box-shadow: 0 0 14px rgba(239, 68, 68, 0.75);
    }

    .presence-panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(2, 10, 19, 0.35);
      margin-bottom: 14px;
      position: relative;
    }

    .presence-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .presence-user,
    .presence-empty {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      font-size: 14px;
      font-weight: 700;
    }

    .presence-empty {
      color: var(--muted);
    }

    .presence-user.is-offline {
      color: var(--muted);
    }

    #chat {
      min-height: 280px;
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2, 10, 19, 0.42);
      margin-bottom: 14px;
      position: relative;
    }

    .message {
      padding: 8px 0;
      border-bottom: 1px solid rgba(238, 246, 255, 0.1);
      overflow-wrap: anywhere;
    }

    .message:last-child {
      border-bottom: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input,
    button {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      font: inherit;
    }

    input {
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.9);
      color: #0b1725;
    }

    button {
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 12px 26px rgba(20, 184, 166, 0.25);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(20, 184, 166, 0.32);
    }

    .owner-mark {
      position: fixed;
      left: clamp(14px, 3vw, 32px);
      bottom: clamp(14px, 3vw, 28px);
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(239, 246, 255, 0.18), rgba(45, 212, 191, 0.12)),
        rgba(4, 13, 24, 0.58);
      box-shadow:
        0 12px 34px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      color: #f8fbff;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      font-size: clamp(12px, 2vw, 15px);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(45, 212, 191, 0.75);
      backdrop-filter: blur(16px);
    }

    .owner-mark::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, #facc15, #2dd4bf);
      box-shadow: 0 0 16px rgba(250, 204, 21, 0.78);
    }

    input:focus,
    button:focus {
      outline: 3px solid rgba(45, 212, 191, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 520px) {
      body {
        padding-bottom: 70px;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
    }

    @media (min-width: 620px) {
      .controls {
        grid-template-columns: 160px 1fr 110px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1>Live Chat</h1>
      <div id="userStatus" class="user-status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="userStatusText">Set a username</span>
      </div>
    </div>
    <div class="presence-panel" aria-label="Online users">
      <ul id="presenceList" class="presence-list" aria-live="polite">
        <li class="presence-empty">Set a username to appear online.</li>
      </ul>
    </div>
    <div id="chat" aria-live="polite"></div>
    <div class="controls">
      <input id="name" type="text" autocomplete="name" placeholder="Name">
      <input id="message" type="text" autocomplete="off" placeholder="Message">
      <button type="button" onclick="sendMessage()">Send</button>
    </div>
  </main>
  <div class="owner-mark" aria-label="Owner Ekansh">owner-Ekansh</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDyLOhKgpy5e39qqAzfrOV_-XO5OjCopzk",
      authDomain: "onepieceisreal123.firebaseapp.com",
      databaseURL: "https://onepieceisreal123-default-rtdb.firebaseio.com",
      projectId: "onepieceisreal123",
      storageBucket: "onepieceisreal123.appspot.com",
      messagingSenderId: "639663352503",
      appId: "1:639663352503:web:77d2ea0a84a8e3cc413b32"
    };

    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();
    var chat = document.getElementById("chat");
    var userStatus = document.getElementById("userStatus");
    var userStatusText = document.getElementById("userStatusText");
    var presenceList = document.getElementById("presenceList");
    var nameInput = document.getElementById("name");
    var activeUsername = "";
    var heartbeatTimer = null;
    var presencePollTimer = null;
    var nameTimer = null;

    function setCurrentUserStatus(username, isOnline) {
      userStatus.classList.toggle("is-offline", !isOnline);
      if (!username) {
        userStatus.classList.add("is-offline");
        userStatusText.textContent = "Set a username";
        userStatus.setAttribute("aria-label", "Set a username to appear online");
        return;
      }

      userStatusText.textContent = username + (isOnline ? " is online" : " is offline");
      userStatus.setAttribute("aria-label", (isOnline ? "Online: " : "Offline: ") + userStatusText.textContent);
    }

    function renderPresence(users) {
      presenceList.textContent = "";
      var onlineUsers = users.filter(function(user) {
        return user.online;
      });

      if (!onlineUsers.length) {
        var empty = document.createElement("li");
        empty.className = "presence-empty";
        empty.textContent = "No one is online yet.";
        presenceList.appendChild(empty);
        return;
      }

      onlineUsers.forEach(function(user) {
        var item = document.createElement("li");
        var dot = document.createElement("span");
        var text = document.createElement("span");

        item.className = "presence-user";
        dot.className = "status-dot";
        dot.setAttribute("aria-hidden", "true");
        text.textContent = user.username + " is online";

        item.appendChild(dot);
        item.appendChild(text);
        presenceList.appendChild(item);
      });
    }

    function postPresence(username, online) {
      if (!username || !navigator.onLine) {
        setCurrentUserStatus(username, false);
        return Promise.resolve();
      }

      return fetch("/api/presence", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ username: username, online: online }),
        keepalive: true
      }).then(function(response) {
        if (!response.ok) {
          throw new Error("Presence update failed");
        }
        setCurrentUserStatus(username, online);
        return refreshPresence();
      }).catch(function() {
        setCurrentUserStatus(username, false);
      });
    }

    function refreshPresence() {
      return fetch("/api/presence", { cache: "no-store" })
        .then(function(response) {
          if (!response.ok) {
            throw new Error("Presence load failed");
          }
          return response.json();
        })
        .then(function(data) {
          var users = Array.isArray(data.users) ? data.users : [];
          var current = users.find(function(user) {
            return user.username === activeUsername;
          });

          renderPresence(users);
          setCurrentUserStatus(activeUsername, current ? current.online : Boolean(activeUsername && navigator.onLine));
        })
        .catch(function() {
          setCurrentUserStatus(activeUsername, false);
        });
    }

    function updatePresenceFromName() {
      var nextUsername = nameInput.value.trim().slice(0, 32);
      var previousUsername = activeUsername;

      if (nextUsername === previousUsername) {
        if (nextUsername) {
          postPresence(nextUsername, true);
        } else {
          setCurrentUserStatus("", false);
        }
        return;
      }

      activeUsername = nextUsername;

      if (previousUsername) {
        postPresence(previousUsername, false);
      }

      if (activeUsername) {
        postPresence(activeUsername, true);
      } else {
        setCurrentUserStatus("", false);
      }
    }

    function startHeartbeat() {
      updatePresenceFromName();
      refreshPresence();

      heartbeatTimer = window.setInterval(function() {
        if (activeUsername) {
          postPresence(activeUsername, true);
        }
      }, 15000);

      presencePollTimer = window.setInterval(refreshPresence, 5000);
    }

    function markCurrentUserOffline() {
      if (!activeUsername) {
        return;
      }

      navigator.sendBeacon(
        "/api/presence",
        new Blob([JSON.stringify({ username: activeUsername, online: false })], { type: "application/json" })
      );
    }

    nameInput.addEventListener("input", function() {
      window.clearTimeout(nameTimer);
      nameTimer = window.setTimeout(updatePresenceFromName, 350);
    });
    window.addEventListener("online", updatePresenceFromName);
    window.addEventListener("offline", function() {
      setCurrentUserStatus(activeUsername, false);
    });
    window.addEventListener("pagehide", markCurrentUserOffline);
    window.addEventListener("beforeunload", markCurrentUserOffline);
    startHeartbeat();

    database.ref("messages").on("child_added", function(snapshot) {
      var msg = snapshot.val();
      var div = document.createElement("div");
      div.className = "message";
      div.textContent = msg.name + ": " + msg.text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    });

    function sendMessage() {
      var name = nameInput.value.trim();
      var message = document.getElementById("message").value.trim();

      if (name === "" || message === "") {
        alert("Enter name and message");
        return;
      }

      database.ref("messages").push({
        name: name,
        text: message
      });

      if (name !== activeUsername) {
        updatePresenceFromName();
      }

      document.getElementById("message").value = "";
    }
  </script>
</body>
</html>
